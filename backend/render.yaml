services:
  - type: web
    name: atomquest-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atomquest-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://atomquest.vercel.app"

databases:
  - name: atomquest-db
    databaseName: atomquest
    user: admin
